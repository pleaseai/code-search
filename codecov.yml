# Codecov configuration — https://docs.codecov.com/docs/codecov-yaml
coverage:
  precision: 2
  round: down
  range: 70...100
  status:
    # Report coverage on the PR, but don't fail the check while the library is
    # still growing. Flip `informational: false` once coverage stabilises.
    project:
      default:
        target: auto
        threshold: 1%
        informational: true
    patch:
      default:
        informational: true

comment:
  layout: 'reach, diff, flags, files'
  require_changes: false

# Coverage is generated by `bun test --coverage` (lcov). Test files are already
# excluded from the lcov report, so only product source is measured.
