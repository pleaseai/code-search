# Codecov configuration — https://docs.codecov.com/docs/codecov-yaml
coverage:
  precision: 2
  round: down
  range: 70...100
  status:
    # Report coverage on the PR, but don't fail the check while the library is
    # still growing. Flip `informational: false` once coverage stabilises.
    project:
      default:
        target: auto
        threshold: 1%
        informational: true
    patch:
      default:
        informational: true

comment:
  layout: 'reach, diff, flags, components, files'
  require_changes: false

# Upload-time flags. ci.yml uploads TypeScript coverage with `flags: typescript`
# and sonar.yml uploads Rust coverage with `flags: rust`. carryforward keeps the
# last known coverage for a flag when its workflow doesn't run on a given commit.
flags:
  typescript:
    paths:
      - src/
    carryforward: true
  rust:
    paths:
      - crates/
    carryforward: true

# Components group coverage by path at display time (independent of upload flags),
# giving a per-language breakdown in the Codecov UI and PR comment.
component_management:
  individual_components:
    - component_id: typescript
      name: TypeScript
      paths:
        - src/**
    - component_id: rust
      name: Rust
      paths:
        - crates/**

# Coverage is generated by `bun test --coverage` (TypeScript, lcov) and
# `cargo llvm-cov` (Rust, lcov). Test files are excluded from both lcov reports,
# so only product source is measured.
